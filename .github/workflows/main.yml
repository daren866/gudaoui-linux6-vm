    # ===== 准备 MicroPython x64 （轻量级 Python 实现） =====
    - name: Prepare MicroPython x64
      run: |
        echo "🐍 准备 MicroPython x64 版本..."

        # 创建目标目录
        mkdir -p python-root/usr/bin
        mkdir -p python-root/usr/lib
        mkdir -p python-root/lib/x86_64-linux-gnu
        mkdir -p python-root/home

        # 1. 下载预编译的 MicroPython .deb 包 (amd64)
        #    使用最新的 1.26.1 版本，可从多个镜像获取 [citation:5]
        MICROPYTHON_DEB_URL="http://ftp.dk.freebsd.org/pub/kali/pool/main/m/micropython/micropython_1.26.1+ds-1_amd64.deb"
        wget -q ${MICROPYTHON_DEB_URL} -O micropython.deb

        # 2. 解压 .deb 包
        dpkg-deb -x micropython.deb micropython-extract

        # 3. 复制 MicroPython 主程序
        if [ -f "micropython-extract/usr/bin/micropython" ]; then
          cp micropython-extract/usr/bin/micropython python-root/usr/bin/
          echo "✅ MicroPython 二进制文件已复制"
        else
          echo "❌ 未找到 MicroPython 二进制文件"
          exit 1
        fi

        # 4. 分析并复制 MicroPython 的依赖库
        echo "复制 MicroPython 依赖库..."
        MICROPY_BIN="python-root/usr/bin/micropython"
        
        # 复制程序本身以便 ldd 分析
        cp micropython-extract/usr/bin/micropython ./
        
        # 使用 ldd 找出所有依赖库并复制到 python-root 下
        ldd ./micropython | grep -o '/[^ ]*' | while read lib; do
            if [ -f "$lib" ]; then
                dir=$(dirname $lib)
                mkdir -p "python-root$dir"
                cp -n "$lib" "python-root$dir/"
                echo "  已复制库: $lib"
            fi
        done
        
        # 特别处理动态链接器 (ld-linux)，如果上一步没复制到
        if [ ! -f python-root/lib64/ld-linux-x86-64.so.2 ]; then
            LD_LINUX=$(find /lib /lib64 -name 'ld-linux-x86-64.so.2' 2>/dev/null | head -1)
            if [ -n "$LD_LINUX" ]; then
                mkdir -p python-root/lib64
                cp -P "$LD_LINUX" python-root/lib64/
                echo "  已复制动态链接器: $LD_LINUX"
            fi
        fi

        # 5. 清理临时文件
        rm -rf micropython.deb micropython-extract ./micropython

        # 6. 创建 MicroPython 测试脚本
        cat > python-root/home/test.py << 'EOF'
        # Simple MicroPython test script
        import sys
        
        print("=" * 40)
        print("MicroPython Test")
        print("=" * 40)
        print(f"MicroPython version: {sys.version}")
        print(f"Platform: {sys.platform}")
        print("=" * 40)
        
        print("\nSimple calculations:")
        print(f"1 + 2 = {1 + 2}")
        print(f"3 * 4 = {3 * 4}")
        print(f"10 / 3 = {10 / 3}")
        
        print("\nMicroPython is working in your custom system!")
        EOF
        
        chmod +x python-root/home/test.py
        
        echo "✅ MicroPython 准备完成"
        echo "MicroPython 二进制大小: $(du -h python-root/usr/bin/micropython | cut -f1)"
