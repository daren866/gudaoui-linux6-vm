name: Build Linux Kernel 6.18 with BusyBox (SquashFS + Overlay)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      release_title: ${{ steps.set-release-info.outputs.release_title }}
      release_tag: ${{ steps.set-release-info.outputs.release_tag }}
      iso_path: ${{ steps.set-release-info.outputs.iso_path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set release info
        id: set-release-info
        run: |
          UNIX_TIMESTAMP=$(date +%s)
          RELEASE_NUMBER=$((UNIX_TIMESTAMP * 9178666))
          RELEASE_TITLE="Linux6-${RELEASE_NUMBER}"
          ISO_NAME="linux6-vm-${UNIX_TIMESTAMP}.iso"
          echo "release_title=$RELEASE_TITLE" >> $GITHUB_OUTPUT
          echo "release_tag=linux6-vm-${UNIX_TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "iso_name=$ISO_NAME" >> $GITHUB_OUTPUT
          echo "RELEASE_TITLE=$RELEASE_TITLE" >> $GITHUB_ENV
          echo "ISO_NAME=$ISO_NAME" >> $GITHUB_ENV

      - name: Generate cache keys
        id: cache-keys
        run: |
          cat > /tmp/kernel-config.txt << 'EOF'
          KERNEL_VERSION=6.18
          VIRTIO_ENABLED=1
          NETWORK_MODULES_ENABLED=1
          FAILOVER_MODULE=1
          SQUASHFS_OVERLAY=1
          EOF
          KERNEL_HASH=$(sha256sum /tmp/kernel-config.txt | cut -d' ' -f1)
          echo "kernel_hash=$KERNEL_HASH" >> $GITHUB_OUTPUT
          
          cat > /tmp/busybox-config.txt << 'EOF'
          BUSYBOX_VERSION=1.36.1
          STATIC_ENABLED=1
          UDHCPC_ENABLED=1
          ASH_ENABLED=1
          EOF
          BUSYBOX_HASH=$(sha256sum /tmp/busybox-config.txt | cut -d' ' -f1)
          echo "busybox_hash=$BUSYBOX_HASH" >> $GITHUB_OUTPUT

      - name: Cache kernel build
        uses: actions/cache@v4
        id: kernel-cache
        with:
          path: |
            linux-6.18
            !linux-6.18/.git
          key: kernel-6.18-${{ steps.cache-keys.outputs.kernel_hash }}
          restore-keys: |
            kernel-6.18-

      - name: Cache busybox build
        uses: actions/cache@v4
        id: busybox-cache
        with:
          path: |
            busybox-1.36.1
            !busybox-1.36.1/.git
          key: busybox-1.36.1-${{ steps.cache-keys.outputs.busybox_hash }}
          restore-keys: |
            busybox-1.36.1-

      - name: Check cache status
        run: |
          echo "## 🔍 缓存状态" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 内核缓存" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.kernel-cache.outputs.cache-hit }}" == "true" ]]; then
            echo "✅ **内核缓存命中！**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **内核缓存未命中**（首次运行正常）" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### BusyBox 缓存" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.busybox-cache.outputs.cache-hit }}" == "true" ]]; then
            echo "✅ **BusyBox 缓存命中！**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **BusyBox 缓存未命中**（首次运行正常）" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncurses-dev \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            bc \
            wget \
            curl \
            cpio \
            xorriso \
            grub-pc-bin \
            grub-common \
            mtools \
            dosfstools \
            git \
            pkg-config \
            squashfs-tools \
            zlib1g-dev \
            autoconf \
            automake \
            libtool \
            binutils \
            libmbedtls-dev

      - name: Download kernel source
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          echo "📥 下载内核源码..."
          wget -q --tries=5 --timeout=30 https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.18.tar.xz || \
          curl -L -o linux-6.18.tar.xz https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.18.tar.xz
          tar -xf linux-6.18.tar.xz

      - name: Configure kernel
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          cd linux-6.18
          echo "📝 配置内核..."
          make defconfig
          
          scripts/config --enable VIRTIO
          scripts/config --enable VIRTIO_PCI
          scripts/config --enable VIRTIO_BLK
          scripts/config --module VIRTIO_NET
          scripts/config --module VMXNET3
          scripts/config --module E1000
          scripts/config --module FAILOVER
          scripts/config --module NET_FAILOVER
          scripts/config --enable PACKET
          scripts/config --enable UNIX
          scripts/config --enable INET
          scripts/config --enable IP_PNP
          scripts/config --enable IP_PNP_DHCP
          scripts/config --enable NETDEVICES
          scripts/config --enable ACPI
          scripts/config --enable DEVTMPFS
          
          # 关键：启用 squashfs 和 overlayfs
          scripts/config --enable SQUASHFS
          scripts/config --enable SQUASHFS_XZ
          scripts/config --enable OVERLAY_FS
          
          make olddefconfig
          
          # 强制模块配置
          sed -i 's/^CONFIG_FAILOVER=.*/CONFIG_FAILOVER=m/' .config
          sed -i 's/^CONFIG_NET_FAILOVER=.*/CONFIG_NET_FAILOVER=m/' .config
          sed -i 's/^CONFIG_VIRTIO_NET=.*/CONFIG_VIRTIO_NET=m/' .config
          grep -q "^CONFIG_FAILOVER=" .config || echo "CONFIG_FAILOVER=m" >> .config
          grep -q "^CONFIG_NET_FAILOVER=" .config || echo "CONFIG_NET_FAILOVER=m" >> .config
          grep -q "^CONFIG_VIRTIO_NET=" .config || echo "CONFIG_VIRTIO_NET=m" >> .config
          
          make olddefconfig

      - name: Build kernel image
        run: |
          cd linux-6.18
          if [ -f "arch/x86/boot/bzImage" ] && [ "${{ steps.kernel-cache.outputs.cache-hit }}" == "true" ]; then
            echo "✅ 使用缓存的内核镜像"
          else
            echo "🔨 编译内核..."
            make -j$(nproc) bzImage
          fi
          ls -lh arch/x86/boot/bzImage

      - name: Build kernel modules
        run: |
          cd linux-6.18
          if [ -f "modules.tar.gz" ]; then
            echo "✅ 模块包已存在"
          else
            echo "🔨 编译内核模块..."
            make modules_prepare
            make -j$(nproc) modules
            mkdir -p ../modules-install
            make modules_install INSTALL_MOD_PATH=../modules-install
            cd ../modules-install
            tar -czf ../linux-6.18/modules.tar.gz lib
            cd ../linux-6.18
            rm -rf ../modules-install
          fi

      - name: Download BusyBox
        if: steps.busybox-cache.outputs.cache-hit != 'true'
        run: |
          echo "📥 下载 BusyBox..."
          wget -q --tries=5 --timeout=30 https://busybox.net/downloads/busybox-1.36.1.tar.bz2 || \
          curl -L -o busybox-1.36.1.tar.bz2 https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar -xf busybox-1.36.1.tar.bz2

      - name: Configure BusyBox
        if: steps.busybox-cache.outputs.cache-hit != 'true'
        run: |
          cd busybox-1.36.1
          echo "🔧 配置 BusyBox..."
          make allnoconfig
          
          cat >> .config << 'EOF'
          CONFIG_STATIC=y
          CONFIG_ASH=y
          CONFIG_ASH_MATH_SUPPORT=y
          CONFIG_ASH_MATH_SUPPORT_64=y
          CONFIG_UDHCPC=y
          CONFIG_IFCONFIG=y
          CONFIG_IP=y
          CONFIG_IPADDR=y
          CONFIG_IPLINK=y
          CONFIG_IPROUTE=y
          CONFIG_FEATURE_PS_LONG=y
          CONFIG_FEATURE_TOP_CPU_USAGE_PERCENTAGE=y
          CONFIG_FEATURE_SHUTDOWN_LOGIN=y
          CONFIG_FEATURE_VERBOSE_USAGE=y
          CONFIG_LONG_OPTS=y
          CONFIG_FEATURE_DEVPTS=y
          CONFIG_FEATURE_UTMP=y
          CONFIG_FEATURE_WTMP=y
          CONFIG_FEATURE_PIDFILE=y
          CONFIG_PID_FILE_PATH="/var/run"
          CONFIG_BUSYBOX=y
          CONFIG_FEATURE_INSTALLER=y
          CONFIG_INSTALL_NO_USR=n
          CONFIG_FEATURE_SUID=y
          CONFIG_FEATURE_PREFER_APPLETS=n
          CONFIG_BUSYBOX_EXEC_PATH="/proc/self/exe"
          CONFIG_FEATURE_SYSLOG_INFO=y
          CONFIG_PASSWORD_MINLEN=6
          CONFIG_MD5_SMALL=1
          CONFIG_SHA1_SMALL=3
          CONFIG_SHA3_SMALL=1
          CONFIG_FEATURE_NON_POSIX_CP=y
          CONFIG_FEATURE_VERBOSE_CP_MESSAGE=n
          CONFIG_FEATURE_USE_SENDFILE=y
          CONFIG_FEATURE_COPYBUF_KB=4
          CONFIG_MONOTONIC_SYSCALL=y
          CONFIG_IOCTL_HEX2STR_ERROR=y
          CONFIG_FEATURE_EDITING=y
          CONFIG_FEATURE_EDITING_MAX_LEN=1024
          CONFIG_FEATURE_EDITING_VI=n
          CONFIG_FEATURE_EDITING_HISTORY=255
          CONFIG_FEATURE_EDITING_SAVEHISTORY=y
          CONFIG_FEATURE_EDITING_SAVE_ON_EXIT=n
          CONFIG_FEATURE_REVERSE_SEARCH=y
          CONFIG_FEATURE_TAB_COMPLETION=y
          CONFIG_FEATURE_USERNAME_COMPLETION=y
          CONFIG_FEATURE_EDITING_FANCY_PROMPT=y
          CONFIG_FEATURE_EDITING_WINCH=y
          CONFIG_FEATURE_EDITING_ASK_TERMINAL=n
          CONFIG_UNICODE_SUPPORT=y
          CONFIG_FEATURE_CHECK_UNICODE_IN_ENV=n
          CONFIG_SUBST_WCHAR=63
          CONFIG_LAST_SUPPORTED_WCHAR=767
          CONFIG_TRY_LOOP_CONFIGURE=y
          CONFIG_FEATURE_SEAMLESS_XZ=y
          CONFIG_FEATURE_SEAMLESS_LZMA=y
          CONFIG_FEATURE_SEAMLESS_BZ2=y
          CONFIG_FEATURE_SEAMLESS_GZ=y
          CONFIG_GUNZIP=y
          CONFIG_ZCAT=y
          CONFIG_BUNZIP2=y
          CONFIG_BZCAT=y
          CONFIG_UNLZMA=y
          CONFIG_LZCAT=y
          CONFIG_LZMA=y
          CONFIG_UNXZ=y
          CONFIG_XZCAT=y
          CONFIG_XZ=y
          CONFIG_BZIP2=y
          CONFIG_FEATURE_BZIP2_DECOMPRESS=y
          CONFIG_CPIO=y
          CONFIG_FEATURE_CPIO_O=y
          CONFIG_FEATURE_CPIO_P=y
          CONFIG_DPKG=y
          CONFIG_DPKG_DEB=y
          CONFIG_GZIP=y
          CONFIG_FEATURE_GZIP_DECOMPRESS=y
          CONFIG_LZOP=y
          CONFIG_RPM=y
          CONFIG_RPM2CPIO=y
          CONFIG_TAR=y
          CONFIG_FEATURE_TAR_CREATE=y
          CONFIG_FEATURE_TAR_AUTODETECT=y
          CONFIG_FEATURE_TAR_FROM=y
