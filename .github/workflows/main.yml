---
name: Build Linux Kernel 6.18 with BusyBox (SquashFS + Overlay)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      release_title: ${{ steps.set-release-info.outputs.release_title }}
      release_tag: ${{ steps.set-release-info.outputs.release_tag }}
      iso_path: ${{ steps.set-release-info.outputs.iso_path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set release info
        id: set-release-info
        run: |
          UNIX_TIMESTAMP=$(date +%s)
          echo "Unix 时间戳: $UNIX_TIMESTAMP"
          RELEASE_NUMBER=$((UNIX_TIMESTAMP * 9178666))
          echo "Release 数字: $RELEASE_NUMBER"
          RELEASE_TITLE="Linux6 虚拟机版-${RELEASE_NUMBER}"
          echo "Release 标题: $RELEASE_TITLE"
          ISO_NAME="linux6-vm-${UNIX_TIMESTAMP}.iso"
          echo "release_title=$RELEASE_TITLE" >> $GITHUB_OUTPUT
          echo "release_tag=linux6-vm-${UNIX_TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "iso_name=$ISO_NAME" >> $GITHUB_OUTPUT
          echo "release_number=$RELEASE_NUMBER" >> $GITHUB_OUTPUT
          echo "RELEASE_TITLE=$RELEASE_TITLE" >> $GITHUB_ENV
          echo "ISO_NAME=$ISO_NAME" >> $GITHUB_ENV

      - name: Cache kernel build
        uses: actions/cache@v4
        id: kernel-cache
        with:
          path: linux-6.18
          key: kernel-6.18-${{ hashFiles('6.18.x-x86_64-build.conf') }}
          restore-keys: |
            kernel-6.18-

      - name: Cache busybox build
        uses: actions/cache@v4
        id: busybox-cache
        with:
          path: busybox-1.36.1
          key: busybox-1.36.1-${{ hashFiles('busybox-config.conf') }}
          restore-keys: |
            busybox-1.36.1-

      - name: Check cache status
        run: |
          echo "## 🔍 缓存状态" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 内核缓存" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.kernel-cache.outputs.cache-hit }}" == "true" ]]; then
            echo "✅ **内核缓存命中！**" >> $GITHUB_STEP_SUMMARY
            echo "缓存 Key: \`${{ steps.kernel-cache.outputs.primary-key }}\`" \
              >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 内核缓存未命中" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### BusyBox 缓存" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.busybox-cache.outputs.cache-hit }}" == "true" ]]; then
            echo "✅ **BusyBox 缓存命中！**" >> $GITHUB_STEP_SUMMARY
            echo "缓存 Key: \`${{ steps.busybox-cache.outputs.primary-key }}\`" \
              >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ BusyBox 缓存未命中" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncurses-dev \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            bc \
            wget \
            cpio \
            xorriso \
            grub-pc-bin \
            grub-common \
            mtools \
            dosfstools \
            git \
            pkg-config \
            squashfs-tools

      - name: Install libmbedtls-dev
        run: |
          echo "🔐 安装 mbedtls 开发库..."
          sudo apt-get update
          sudo apt-get install -y libmbedtls-dev
          echo "✅ mbedtls 开发库安装完成"

      - name: Download kernel source
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          echo "📥 下载内核源码 linux-6.18..."
          wget -q https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.18.tar.xz
          tar -xf linux-6.18.tar.xz
          echo "✅ 内核源码下载完成"

      - name: Configure kernel
        run: |
          cd linux-6.18
          echo "📝 配置内核..."
          wget -q -O .config.original \
            https://raw.githubusercontent.com/puppylinux-woof-CE/woof-CE/testing/kernel-kit/configs_x86_64/DOTconfig-6.18.1-x86_64 \
            || true
          if [ -f .config.original ]; then
            cp .config.original .config
          else
            make defconfig
          fi
          echo "🔧 应用虚拟机优化（驱动编译为模块）..."
          # 基础 VirtIO 支持
          scripts/config --enable VIRTIO
          scripts/config --enable VIRTIO_PCI
          scripts/config --enable VIRTIO_BLK
          # 网络驱动全部编译为模块
          scripts/config --module VIRTIO_NET
          scripts/config --module VMXNET3
          scripts/config --module E1000
          scripts/config --module PCNET32
          scripts/config --module 8139CP
          scripts/config --module 8139TOO
          scripts/config --module E100
          scripts/config --module NE2K_PCI
          # 关键修复：将 failover 相关也编译为模块，避免符号冲突
          scripts/config --module FAILOVER
          scripts/config --module NET_FAILOVER
          # ============================================================
          # 网络自动配置所需的内核选项（支持 DHCP）
          # ============================================================
          scripts/config --enable PACKET
          scripts/config --enable UNIX
          scripts/config --enable INET
          scripts/config --enable IP_PNP
          scripts/config --enable IP_PNP_DHCP
          # 禁用无关功能
          scripts/config --disable SOUND
          scripts/config --disable USB_SUPPORT
          scripts/config --disable WLAN
          # 电源管理
          scripts/config --enable POWER_SUPPLY
          scripts/config --enable SUSPEND
          scripts/config --enable HIBERNATION
          scripts/config --enable ACPI
          scripts/config --enable ACPI_BUTTON
          scripts/config --enable ACPI_POWER_METER
          scripts/config --enable ACPI_PROC_EVENT
          scripts/config --enable ACPI_SYSTEM_POWER_STATES_SUPPORT
          make olddefconfig

      - name: Build kernel image (if needed)
        run: |
          cd linux-6.18
          if [ -f "arch/x86/boot/bzImage" ] && \
             [ "${{ steps.kernel-cache.outputs.cache-hit }}" == "true" ]; then
            echo "✅ 使用缓存的内核镜像，跳过编译"
          else
            echo "🔨 编译内核镜像中..."
            start_time=$(date +%s)
            make -j$(nproc) bzImage
            end_time=$(date +%s)
            duration=$((end_time - start_time))
            echo "✅ 内核镜像编译完成，耗时: $((duration / 60)) 分钟"
          fi
          echo "内核位置: $(pwd)/arch/x86/boot/bzImage"
          ls -lh arch/x86/boot/bzImage

      - name: Build kernel modules (if needed)
        run: |
          cd linux-6.18
          if [ -f "modules.tar.gz" ]; then
            echo "✅ 模块包已存在，跳过编译"
          else
            echo "🔨 编译内核模块中..."
            start_time=$(date +%s)
            make modules_prepare
            make -j$(nproc) modules
            if [ ! -f "modules.builtin" ]; then
              echo "🔧 生成 modules.builtin..."
              make modules.builtin
            fi
            mkdir -p ../modules-install
            make modules_install INSTALL_MOD_PATH=../modules-install
            KVER=$(ls ../modules-install/lib/modules/ | head -1)
            if [ -n "$KVER" ] && [ ! -f "../modules-install/lib/modules/$KVER/modules.builtin" ]; then
              cp modules.builtin ../modules-install/lib/modules/$KVER/ 2>/dev/null || true
            fi
            cd ../modules-install
            tar -czf ../linux-6.18/modules.tar.gz lib
            cd ../linux-6.18
            rm -rf ../modules-install
            end_time=$(date +%s)
            duration=$((end_time - start_time))
            echo "✅ 内核模块编译打包完成，耗时: $((duration / 60)) 分钟"
          fi
          if [ -f "modules.tar.gz" ]; then
            echo "模块包大小: $(du -h modules.tar.gz | cut -f1)"
          fi

      - name: Download BusyBox
        if: steps.busybox-cache.outputs.cache-hit != 'true'
        run: |
          echo "📥 下载 BusyBox 1.36.1..."
          wget -q https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar -xf busybox-1.36.1.tar.bz2
          echo "✅ BusyBox 下载完成"

      - name: Configure BusyBox
        run: |
          cd busybox-1.36.1
          echo "🔧 配置 BusyBox..."
          make defconfig
          sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config
          sed -i 's/# CONFIG_ASH is not set/CONFIG_ASH=y/' .config
          sed -i 's/# CONFIG_SH is not set/CONFIG_SH=y/' .config
          sed -i 's/# CONFIG_ASH_MATH_SUPPORT is not set/CONFIG_ASH_MATH_SUPPORT=y/' .config
          sed -i 's/# CONFIG_ASH_MATH_SUPPORT_64 is not set/CONFIG_ASH_MATH_SUPPORT_64=y/' .config
          sed -i 's/# CONFIG_REBOOT is not set/CONFIG_REBOOT=y/' .config
          sed -i 's/# CONFIG_HALT is not set/CONFIG_HALT=y/' .config
          sed -i 's/# CONFIG_POWEROFF is not set/CONFIG_POWEROFF=y/' .config
          sed -i 's/CONFIG_TC=y/# CONFIG_TC is not set/' .config 2>/dev/null || true
          sed -i 's/# CONFIG_FEATURE_PS_LONG is not set/CONFIG_FEATURE_PS_LONG=y/' .config
          sed -i 's/# CONFIG_FEATURE_TOP_CPU_USAGE_PERCENTAGE is not set/CONFIG_FEATURE_TOP_CPU_USAGE_PERCENTAGE=y/' .config
          sed -i 's/# CONFIG_FEATURE_SHUTDOWN_LOGIN is not set/CONFIG_FEATURE_SHUTDOWN_LOGIN=y/' .config
          # ============================================================
          # 启用 udhcpc（DHCP 客户端）
          # ============================================================
          sed -i 's/# CONFIG_UDHCPC is not set/CONFIG_UDHCPC=y/' .config
          make oldconfig

      - name: Build BusyBox
        run: |
          cd busybox-1.36.1
          if [ -f "busybox" ] && \
             [ "${{ steps.busybox-cache.outputs.cache-hit }}" == "true" ]; then
            echo "✅ 使用缓存的 BusyBox，跳过编译"
          else
            echo "🔨 编译 BusyBox 中..."
            make -j$(nproc)
            make install
            echo "✅ BusyBox 编译完成"
          fi
          ls -lh busybox

      - name: Build MicroPython from source
        run: |
          echo "🐍 从源码编译 MicroPython x64（强制禁用 cryptolib，启用 mbedtls）..."
          mkdir -p python-root/usr/local/bin
          mkdir -p python-root/home
          git clone https://github.com/micropython/micropython.git
          cd micropython
          git checkout v1.24.1
          git submodule update --init --recursive
          make -C mpy-cross
          cd ports/unix
          printf '%s\n' \
            '# 模块配置 - 强制禁用 cryptolib，使用 mbedtls 提供 SSL 和哈希' \
            'MICROPY_PY_BTREE = 0' \
            'MICROPY_PY_SSL = 1' \
            'MICROPY_SSL_MBEDTLS = 1' \
            'MICROPY_PY_CRYPTOLIB = 0' \
            'MICROPY_PY_HASHLIB = 1' \
            'MICROPY_PY_TERMIOS = 1' \
            'MICROPY_PY_SOCKET = 1' \
            'MICROPY_PY_FFI = 0' \
            'MICROPY_PY_THREAD = 0' \
            'MICROPY_USE_READLINE = 1' > mpconfigport.mk
          if [ -f "variants/standard/mpconfigvariant.h" ]; then
            sed -i '/MICROPY_PY_CRYPTOLIB/d' variants/standard/mpconfigvariant.h
            echo "#undef MICROPY_PY_CRYPTOLIB" >> variants/standard/mpconfigvariant.h
            echo "#define MICROPY_PY_CRYPTOLIB (0)" >> variants/standard/mpconfigvariant.h
          fi
          make -j$(nproc) \
            CFLAGS_EXTRA="-static -I/usr/include/mbedtls" \
            LDFLAGS_EXTRA="-static" \
            MICROPY_PY_CRYPTOLIB=0
          if [ -f "micropython" ]; then
            cp micropython ../../../python-root/usr/local/bin/
          elif [ -f "build-standard/micropython" ]; then
            cp build-standard/micropython ../../../python-root/usr/local/bin/
          else
            echo "❌ MicroPython 编译失败: 找不到 micropython 可执行文件"
            exit 1
          fi
          if [ -f "../../../python-root/usr/local/bin/micropython" ]; then
            echo "✅ MicroPython 编译成功"
            file ../../../python-root/usr/local/bin/micropython
          else
            echo "❌ MicroPython 编译失败"
            exit 1
          fi
          cd ../../..
          rm -rf micropython
          printf '%s\n' \
            'import sys' \
            'print("=" * 40)' \
            'print("MicroPython Test")' \
            'print("=" * 40)' \
            'print(f"MicroPython version: {sys.version}")' \
            'print(f"Platform: {sys.platform}")' \
            'print("=" * 40)' \
            'print("\nSimple calculations:")' \
            'print(f"1 + 2 = {1 + 2}")' \
            'print(f"3 * 4 = {3 * 4}")' \
            'print(f"10 / 3 = {10 / 3}")' \
            'print("\nMicroPython is working in your custom system!")' \
            > python-root/home/test.py
          chmod +x python-root/home/test.py
          cd python-root/usr/local/bin
          ln -sf micropython python
          ln -sf micropython python3
          cd ../../../..
          echo "✅ MicroPython 编译完成"
          echo "MicroPython 二进制大小: $(du -h python-root/usr/local/bin/micropython | cut -f1)"
          echo "Python 命令路径: $(ls -la python-root/usr/local/bin/python*)"

      - name: Create rootfs (to be squashfs)
        run: |
          echo "📦 创建 rootfs 目录（将用于 squashfs）..."
          mkdir -p rootfs/{bin,sbin,usr/bin,usr/sbin,usr/local/bin,etc,proc,sys,dev,lib,lib64,tmp,var,run,root,home,usr/share/udhcpc}
          cp -a busybox-1.36.1/_install/* rootfs/
          cp -a python-root/* rootfs/

          # ============================================================
          # 创建 udhcpc 默认脚本（DHCP 配置 DNS 的关键）
          # 参考：https://wiki.alpinelinux.cn/wiki/Udhcpc
          # ============================================================
          cat > rootfs/usr/share/udhcpc/default.script << 'EOF'
          #!/bin/sh
          # udhcpc 默认脚本 - 配置网络接口和 DNS
          # 当 udhcpc 获取到 IP 后会自动调用此脚本

          INTERFACE="$1"
          [ -n "$INTERFACE" ] || exit 1

          case "$2" in
          deconfig)
              # 接口被释放时清理配置
              ip addr flush dev "$INTERFACE" 2>/dev/null
              ip link set "$INTERFACE" down 2>/dev/null
              ;;
          bound|renew)
              # 获取到 IP 或续约时配置网络
              # 设置 IP 地址
              ip addr add "$ip/$mask" dev "$INTERFACE" 2>/dev/null
              ip link set "$INTERFACE" up 2>/dev/null
              
              # 设置默认路由
              if [ -n "$router" ]; then
                  # 删除现有默认路由
                  ip route del default 2>/dev/null
                  for r in $router; do
                      ip route add default via "$r" dev "$INTERFACE" 2>/dev/null
                      break
                  done
              fi
              
              # 设置 DNS（从 DHCP 获取的）
              if [ -n "$dns" ]; then
                  # 构建 resolv.conf 头
                  echo "# Generated by udhcpc from DHCP" > /etc/resolv.conf.tmp
                  for ns in $dns; do
                      echo "nameserver $ns" >> /etc/resolv.conf.tmp
                  done
                  mv /etc/resolv.conf.tmp /etc/resolv.conf
              fi
              ;;
          esac
          exit 0
          EOF
          chmod +x rootfs/usr/share/udhcpc/default.script

          # 解压内核模块到 rootfs/lib/modules
          if [ -f linux-6.18/modules.tar.gz ]; then
            echo "📦 解压内核模块到 rootfs..."
            tar -xzf linux-6.18/modules.tar.gz -C rootfs/
          else
            echo "⚠️ 未找到内核模块包，网络驱动可能缺失"
          fi

          if [ ! -f "rootfs/usr/local/bin/micropython" ]; then
            echo "❌ MicroPython binary not found in rootfs!"
            exit 1
          fi
          echo "✅ MicroPython binary found in rootfs: $(file rootfs/usr/local/bin/micropython)"
          chmod 555 rootfs/usr/local/bin/micropython
          cd rootfs/usr/local/bin
          if [ -f "micropython" ] && [ ! -L "python" ]; then
            ln -sf micropython python
            ln -sf micropython python3
          fi
          cd ../../../..
          mkdir -p rootfs/etc/profile.d
          printf '%s\n' 'export PATH=/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin' \
            > rootfs/etc/profile.d/python.sh
          chmod +x rootfs/etc/profile.d/python.sh
          sudo mknod -m 666 rootfs/dev/null c 1 3 || true
          sudo mknod -m 644 rootfs/dev/console c 5 1 || true
          sudo mknod -m 660 rootfs/dev/tty1 c 4 1 || true
          sudo mknod -m 660 rootfs/dev/tty2 c 4 2 || true
          sudo mknod -m 660 rootfs/dev/tty3 c 4 3 || true
          sudo mknod -m 660 rootfs/dev/tty4 c 4 4 || true
          printf '%s\n' \
            '#!/bin/sh' \
            'echo "====================="' \
            'echo "GudaoUI Linux V1"' \
            'echo "====================="' \
            'echo "System Information:"' \
            'echo "  OS: GudaoUI Linux"' \
            'echo "  Kernel: $(uname -r)"' \
            'echo "  Architecture: $(uname -m)"' \
            'echo ""' \
            'echo "Commands:"' \
            'echo "  about     - Show this information"' \
            'echo "  calc      - Simple calculator"' \
            'echo "  python    - MicroPython interpreter"' \
            'echo "  reboot    - Restart system"' \
            'echo "  poweroff  - Shutdown system"' \
            'echo ""' \
            'if command -v python >/dev/null 2>&1; then' \
            '    echo "MicroPython: $(python --version 2>&1)"' \
            'else' \
            '    echo "MicroPython: Not available"' \
            'fi' > rootfs/usr/local/bin/about
          chmod +x rootfs/usr/local/bin/about
          printf '%s\n' \
            '#!/bin/sh' \
            'if [ $# -eq 0 ]; then' \
            '    echo "Usage: calc <expression>"' \
            '    echo "Example: calc 1+1"' \
            '    echo "Example: calc (2*2)+2"' \
            '    exit 1' \
            'fi' \
            'expression="$*"' \
            'result=$(awk "BEGIN {print $expression}")' \
            'if [ "$result" = "${result%.*}" ]; then' \
            '    echo "$result"' \
            'else' \
            '    printf "%.2f\n" "$result"' \
            'fi' > rootfs/usr/local/bin/calc
          chmod +x rootfs/usr/local/bin/calc
          printf '%s\n' \
            '#!/bin/sh' \
            'echo "System is rebooting..."' \
            'sync' \
            '/bin/busybox reboot -f' > rootfs/usr/local/bin/reboot
          chmod +x rootfs/usr/local/bin/reboot
          printf '%s\n' \
            '#!/bin/sh' \
            'echo "System is powering off..."' \
            'sync' \
            '/bin/busybox poweroff -f' > rootfs/usr/local/bin/poweroff
          chmod +x rootfs/usr/local/bin/poweroff
          cd rootfs/usr/bin
          ln -sf ../local/bin/about about || true
          ln -sf ../local/bin/calc calc || true
          ln -sf ../local/bin/reboot reboot || true
          ln -sf ../local/bin/poweroff poweroff || true
          ln -sf poweroff halt || true
          cd ../../..
          # ============================================================
          # init 脚本：自动加载网卡驱动 + DHCP 获取 IP + 固定 DNS
          # ============================================================
          printf '%s\n' \
            '#!/bin/sh' \
            'export PATH=/bin:/sbin:/usr/bin:/usr/sbin:/usr/local/bin' \
            'export TERM=linux' \
            '/bin/busybox mount -t proc none /proc' \
            '/bin/busybox mount -t sysfs none /sys' \
            '/bin/busybox mount -t devtmpfs none /dev' \
            '/bin/busybox mount -t tmpfs tmpfs /tmp' \
            '/bin/busybox mount -t tmpfs tmpfs /run' \
            '/bin/busybox mount -t tmpfs tmpfs /dev/shm' \
            '/bin/busybox mkdir -p /dev/shm /run/lock /etc/profile.d' \
            '/bin/busybox mknod -m 660 /dev/tty1 c 4 1 2>/dev/null || true' \
            '/bin/busybox mknod -m 660 /dev/tty2 c 4 2 2>/dev/null || true' \
            '/bin/busybox echo "gudao-ui" > /proc/sys/kernel/hostname 2>/dev/null || true' \
            '/bin/busybox --install -s' \
            '' \
            '# 加载内核模块' \
            'if [ -d /lib/modules ]; then' \
            '    echo "Loading kernel modules..."' \
            '    depmod -a 2>/dev/null' \
            '    modprobe failover 2>/dev/null && echo "  Loaded failover" || true' \
            '    modprobe net_failover 2>/dev/null && echo "  Loaded net_failover" || true' \
            '    for mod in e1000 e100 pcnet32 8139cp 8139too ne2k-pci virtio_net vmxnet3; do' \
            '        modprobe $mod 2>/dev/null && echo "  Loaded $mod" || true' \
            '    done' \
            'fi' \
            '' \
            '# ============================================' \
            '# 网络自动配置（DHCP + 固定 DNS）' \
            '# ============================================' \
            'echo ""' \
            'echo "=== Network Configuration ==="' \
            '' \
            '# 等待网络设备就绪' \
            'sleep 2' \
            '' \
            '# 遍历所有以太网接口' \
            'CONFIGURED=0' \
            'for iface in $(ip link show | grep -E "^[0-9]+: (eth|ens|enp)" | cut -d: -f2 | tr -d " "); do' \
            '    echo "Configuring $iface via DHCP..."' \
            '    # 使用 udhcpc 获取 IP，指定自定义脚本' \
            '    if udhcpc -i "$iface" -s /usr/share/udhcpc/default.script -n -q -t 5 -T 2 2>/dev/null; then' \
            '        echo "✅ DHCP succeeded on $iface"' \
            '        CONFIGURED=1' \
            '        break' \
            '    else' \
            '        echo "⚠️ DHCP failed on $iface"' \
            '    fi' \
            'done' \
            '' \
            '# 如果没有找到接口，尝试 eth0' \
            'if [ $CONFIGURED -eq 0 ]; then' \
            '    echo "No interfaces found, trying eth0..."' \
            '    ip link set eth0 up 2>/dev/null' \
            '    udhcpc -i eth0 -s /usr/share/udhcpc/default.script -n -q -t 5 -T 2 2>/dev/null && CONFIGURED=1' \
            'fi' \
            '' \
            '# ============================================' \
            '# 强制覆盖 DNS 为指定值（114.114.114.114 和 8.8.8.8）' \
            '# ============================================' \
            'echo ""' \
            'echo "=== DNS Configuration ==="' \
            'cat > /etc/resolv.conf << EOF' \
            '# Generated by GudaoUI init script' \
            'nameserver 114.114.114.114' \
            'nameserver 8.8.8.8' \
            'EOF' \
            'echo "✅ DNS set to 114.114.114.114 and 8.8.8.8"' \
            '' \
            '# 显示网络状态' \
            'echo ""' \
            'echo "=== Network Status ==="' \
            'ip addr show 2>/dev/null | grep -E "inet[^6]" || echo "No IP assigned"' \
            'cat /etc/resolv.conf' \
            'echo "========================"' \
            '' \
            'MEM_SIZE=$(grep MemTotal /proc/meminfo 2>/dev/null | awk '"'"'{print int($2/1024)}'"'"')' \
            '[ -z "$MEM_SIZE" ] && MEM_SIZE="Unknown"' \
            'clear' \
            'echo "========================================"' \
            'echo "     GudaoUI Linux V1"' \
            'echo "========================================"' \
            'echo ""' \
            'echo "Available commands:"' \
            'echo "  about     - System information"' \
            'echo "  calc      - Calculator (e.g., calc 1+1)"' \
            'echo "  python    - MicroPython interpreter"' \
            'echo "  reboot    - Restart system"' \
            'echo "  poweroff  - Shutdown system"' \
            'echo ""' \
            'echo "System: Linux $(uname -r) $(uname -m)"' \
            'echo "Memory: ${MEM_SIZE}MB"' \
            'if command -v python >/dev/null 2>&1; then' \
            '    PY_VERSION=$(python --version 2>&1)' \
            '    echo "${PY_VERSION}"' \
            'fi' \
            'echo ""' \
            'echo "Welcome to GudaoUI Linux!"' \
            'echo "========================================"' \
            'echo ""' \
            'exec /bin/sh' > rootfs/init
          chmod +x rootfs/init
          echo "root:x:0:0:root:/root:/bin/sh" > rootfs/etc/passwd
          echo "root:x:0:" > rootfs/etc/group
          # 预设 DNS 文件
          printf '%s\n' 'nameserver 114.114.114.114' 'nameserver 8.8.8.8' > rootfs/etc/resolv.conf
          echo "127.0.0.1 localhost gudao-ui" > rootfs/etc/hosts
          printf '%s\n' \
            'proc    /proc    proc    defaults    0 0' \
            'sysfs   /sys     sysfs   defaults    0 0' \
            'devtmpfs /dev    devtmpfs defaults  0 0' \
            'tmpfs   /tmp     tmpfs   defaults    0 0' \
            'tmpfs   /run     tmpfs   defaults    0 0' > rootfs/etc/fstab
          printf '%s\n' \
            'export PATH=/bin:/sbin:/usr/bin:/usr/sbin:/usr/local/bin' \
            'export TERM=linux' \
            'export PS1='\''\u@\h:\w\$ '\' \
            'alias ll='\''ls -la'\' \
            'alias python='\''micropython'\' > rootfs/etc/profile
          echo "rootfs 准备完成，大小: $(du -sh rootfs | cut -f1)"

      - name: Create squashfs from rootfs
        run: |
          echo "🗜️ 创建 squashfs 镜像..."
          mksquashfs rootfs rootfs.squashfs -comp xz -b 1M
          echo "✅ squashfs 创建完成: $(du -h rootfs.squashfs | cut -f1)"

      - name: Build initramfs for overlay boot
        run: |
          echo "🛠️ 构建 initramfs（用于挂载 squashfs 和 overlay）..."
          mkdir -p initramfs/{bin,dev,etc,proc,root,sys,mnt/iso,mnt/root,mnt/overlay,newroot}
          cp -a busybox-1.36.1/_install/* initramfs/
          sudo mknod -m 600 initramfs/dev/console c 5 1 || true
          sudo mknod -m 666 initramfs/dev/null c 1 3 || true
          sudo mknod -m 660 initramfs/dev/tty1 c 4 1 || true
          sudo mknod -m 660 initramfs/dev/tty2 c 4 2 || true
          sudo mknod -m 660 initramfs/dev/tty3 c 4 3 || true
          sudo mknod -m 660 initramfs/dev/tty4 c 4 4 || true
          printf '%s\n' \
            '#!/bin/sh' \
            '' \
            'mount -t proc none /proc' \
            'mount -t sysfs none /sys' \
            'mount -t devtmpfs none /dev' \
            '' \
            'sleep 1' \
            '' \
            'echo "GudaoUI Linux - Booting from squashfs with overlay..."' \
            '' \
            'mkdir -p /mnt/iso' \
            '' \
            'ISO_MOUNTED=0' \
            'for dev in /dev/sr* /dev/hd* /dev/sd*; do' \
            '    [ -e "$dev" ] || continue' \
            '    echo "Trying to mount $dev as ISO9660..."' \
            '    if mount -t iso9660 "$dev" /mnt/iso 2>/dev/null; then' \
            '        echo "Successfully mounted $dev on /mnt/iso"' \
            '        ISO_MOUNTED=1' \
            '        break' \
            '    fi' \
            'done' \
            '' \
            'if [ $ISO_MOUNTED -eq 0 ]; then' \
            '    echo "ERROR: Could not mount any device as ISO9660!"' \
            '    exec sh' \
            'fi' \
            '' \
            'if [ ! -f /mnt/iso/boot/rootfs.squashfs ]; then' \
            '    echo "ERROR: /boot/rootfs.squashfs not found on ISO!"' \
            '    echo "Contents of /mnt/iso:"' \
            '    ls -la /mnt/iso' \
            '    echo "Contents of /mnt/iso/boot (if exists):"' \
            '    ls -la /mnt/iso/boot 2>/dev/null || echo "/boot directory not found"' \
            '    exec sh' \
            'fi' \
            '' \
            'mount -t squashfs -o ro,loop /mnt/iso/boot/rootfs.squashfs /mnt/root || {' \
            '    echo "ERROR: Failed to mount squashfs"' \
            '    exec sh' \
            '}' \
            '' \
            'echo "Contents of /mnt/root (squashfs):"' \
            'ls -la /mnt/root' \
            '' \
            'mkdir -p /mnt/overlay' \
            'mount -t tmpfs tmpfs /mnt/overlay' \
            'mkdir -p /mnt/overlay/upper /mnt/overlay/work' \
            '' \
            'mount -t overlay overlay -o lowerdir=/mnt/root,upperdir=/mnt/overlay/upper,workdir=/mnt/overlay/work /newroot || {' \
            '    echo "ERROR: Failed to mount overlay"' \
            '    exec sh' \
            '}' \
            '' \
            'echo "Contents of /newroot (overlay):"' \
            'ls -la /newroot' \
            '' \
            'if [ ! -x /newroot/init ]; then' \
            '    echo "ERROR: /newroot/init not found or not executable!"' \
            '    exec sh' \
            'fi' \
            '' \
            'umount /proc /sys /dev 2>/dev/null' \
            'exec switch_root /newroot /init' > initramfs/init
          chmod +x initramfs/init
          cd initramfs
          find . | cpio -o -H newc | gzip > ../initramfs.cpio.gz
          cd ..
          echo "✅ initramfs 创建完成: $(du -h initramfs.cpio.gz | cut -f1)"

      - name: Create bootable ISO
        run: |
          echo "💿 创建启动 ISO..."
          mkdir -p iso/boot/grub
          cp linux-6.18/arch/x86/boot/bzImage iso/boot/vmlinuz
          cp initramfs.cpio.gz iso/boot/initramfs.cpio.gz
          cp rootfs.squashfs iso/boot/rootfs.squashfs
          printf '%s\n' \
            'set default=0' \
            'set timeout=3' \
            'menuentry "GudaoUI Linux V1 with MicroPython (SquashFS+Overlay)" {' \
            '  linux /boot/vmlinuz quiet' \
            '  initrd /boot/initramfs.cpio.gz' \
            '}' \
            'menuentry "GudaoUI Linux V1 (Debug)" {' \
            '  linux /boot/vmlinuz loglevel=7' \
            '  initrd /boot/initramfs.cpio.gz' \
            '}' > iso/boot/grub/grub.cfg
          grub-mkrescue -o "$ISO_NAME" iso/
          echo "✅ ISO 创建完成: $ISO_NAME"
          echo "ISO 大小: $(du -h $ISO_NAME | cut -f1)"

      - name: Upload ISO to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-release-info.outputs.iso_name }}
          path: ${{ steps.set-release-info.outputs.iso_name }}
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ steps.set-release-info.outputs.release_title }}
          tag_name: ${{ steps.set-release-info.outputs.release_tag }}
          body: |
            ## 🎉 GudaoUI Linux V1 with MicroPython (SquashFS + Overlay)
            ### 📦 包含组件
            - Linux 内核 6.18 (虚拟机优化版，驱动模块化，**支持 DHCP 自动获取 IP**)
            - BusyBox 1.36.1 (静态编译，包含 udhcpc DHCP 客户端)
            - **MicroPython v1.24.1** (从源码编译，静态链接，**启用 SSL 和加密库支持**)
            ### 💻 可用命令
            about - 显示系统信息
            calc - 简单计算器 (如: calc 1+1)
            python - MicroPython 解释器 (可直接运行)
            reboot - 重启系统
            poweroff - 关闭系统
            ### 🌐 网络配置（自动）
            - **自动获取 IP（DHCP）**：系统启动后自动检测网卡并获取 IP
            - **固定 DNS**：114.114.114.114 和 8.8.8.8（启动时强制写入 /etc/resolv.conf）
            - 内核已集成常见虚拟网卡驱动（作为模块）：
              VIRTIO_NET、VMXNET3、E1000、PCNET32、8139CP、8139TOO、E100、NE2K_PCI
            - 系统启动时会自动加载驱动并通过 DHCP 获取 IP
            ### ⚡ 虚拟机优化
            已启用 VirtIO 驱动和 ACPI 电源管理
            ### 📀 文件系统架构
            - 根文件系统为只读 squashfs，通过 overlayfs 与 tmpfs 合并，实现可写运行时环境
            - 内核模块存放于 `/lib/modules`，启动时自动加载
            ### 📊 构建信息
            - 构建时间: $(date '+%Y-%m-%d %H:%M:%S')
            - ISO 大小: $(du -h ${{ steps.set-release-info.outputs.iso_name }} | cut -f1)
            - MicroPython 大小: ~300KB (静态链接，包含 SSL)
          files: ${{ steps.set-release-info.outputs.iso_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
