          CONFIG_ENV=y
          CONFIG_EXPR=y
          CONFIG_FALSE=y
          CONFIG_FIND=y
          CONFIG_HEAD=y
          CONFIG_ID=y
          CONFIG_INSTALL=y
          CONFIG_LN=y
