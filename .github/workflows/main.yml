          CONFIG_TR=y
          CONFIG_TRUE=y
          CONFIG_TTY=y
          CONFIG_UNAME=y
          CONFIG_UNIQ=y
          CONFIG_UNLINK=y
          CONFIG_USLEEP=y
          CONFIG_UUDECODE=y
          CONFIG_BASE32=y
          CONFIG_BASE64=y
          CONFIG_UUENCODE=y
          CONFIG_WC=y
          CONFIG_WHO=y
          CONFIG_W=y
          CONFIG_WHOAMI=y
          CONFIG_YES=y
          CONFIG_CLEAR=y
          CONFIG_RESET=y
          CONFIG_RESIZE=y
          CONFIG_WHICH=y
          CONFIG_RESUME=y
          CONFIG_RUN_INIT=y
          CONFIG_USE_BB_PWD_GRP=y
          CONFIG_USE_BB_SHADOW=y
          CONFIG_USE_BB_CRYPT=y
          CONFIG_USE_BB_CRYPT_SHA=y
          CONFIG_ADDGROUP=y
          CONFIG_FEATURE_ADDUSER_TO_GROUP=y
          CONFIG_ADDUSER=y
          CONFIG_DELUSER=y
          CONFIG_DELGROUP=y
          CONFIG_GETTY=y
          CONFIG_LOGIN=y
          CONFIG_PASSWD=y
          CONFIG_SU=y
