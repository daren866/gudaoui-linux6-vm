name: Build Linux Kernel 6.18 with BusyBox

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

# 添加必要的权限
permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    outputs:
      release_title: ${{ steps.set-release-info.outputs.release_title }}
      release_tag: ${{ steps.set-release-info.outputs.release_tag }}
      iso_path: ${{ steps.set-release-info.outputs.iso_path }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ===== 设置Release信息 =====
    - name: Set release info
      id: set-release-info
      run: |
        # 获取Unix时间戳
        UNIX_TIMESTAMP=$(date +%s)
        echo "Unix时间戳: $UNIX_TIMESTAMP"
        
        # 计算乘以9178666后的数字
        RELEASE_NUMBER=$((UNIX_TIMESTAMP * 9178666))
        echo "Release数字: $RELEASE_NUMBER"
        
        # 生成Release标题
        RELEASE_TITLE="Linux6 虚拟机版-${RELEASE_NUMBER}"
        echo "Release标题: $RELEASE_TITLE"
        
        # 生成ISO文件名
        ISO_NAME="linux6-vm-${UNIX_TIMESTAMP}.iso"
        
        # 设置输出变量
        echo "release_title=$RELEASE_TITLE" >> $GITHUB_OUTPUT
        echo "release_tag=linux6-vm-${UNIX_TIMESTAMP}" >> $GITHUB_OUTPUT
        echo "iso_name=$ISO_NAME" >> $GITHUB_OUTPUT
        echo "release_number=$RELEASE_NUMBER" >> $GITHUB_OUTPUT
        
        # 保存到环境变量
        echo "RELEASE_TITLE=$RELEASE_TITLE" >> $GITHUB_ENV
        echo "ISO_NAME=$ISO_NAME" >> $GITHUB_ENV

    # ===== 🚀 内核缓存 =====
    - name: Cache kernel build
      uses: actions/cache@v4
      id: kernel-cache
      with:
        path: linux-6.18
        key: kernel-6.18-${{ hashFiles('6.18.x-x86_64-build.conf') }}
        restore-keys: |
          kernel-6.18-

    # ===== BusyBox缓存 =====
    - name: Cache busybox build
      uses: actions/cache@v4
      id: busybox-cache
      with:
        path: busybox-1.36.1
        key: busybox-1.36.1-${{ hashFiles('busybox-config.conf') }}
        restore-keys: |
          busybox-1.36.1-

    - name: Check cache status
      run: |
        echo "## 🔍 缓存状态" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "### 内核缓存" >> $GITHUB_STEP_SUMMARY
        if [[ "${{ steps.kernel-cache.outputs.cache-hit }}" == "true" ]]; then
          echo "✅ **内核缓存命中！**" >> $GITHUB_STEP_SUMMARY
          echo "缓存Key: \`${{ steps.kernel-cache.outputs.primary-key }}\`" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ 内核缓存未命中" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### BusyBox缓存" >> $GITHUB_STEP_SUMMARY
        if [[ "${{ steps.busybox-cache.outputs.cache-hit }}" == "true" ]]; then
          echo "✅ **BusyBox缓存命中！**" >> $GITHUB_STEP_SUMMARY
          echo "缓存Key: \`${{ steps.busybox-cache.outputs.primary-key }}\`" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ BusyBox缓存未命中" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libncurses-dev \
          bison \
          flex \
          libssl-dev \
          libelf-dev \
          bc \
          wget \
          cpio \
          xorriso \
          grub-pc-bin \
          grub-common \
          mtools \
          dosfstools

    # ===== 内核部分 =====
    - name: Download kernel source
      if: steps.kernel-cache.outputs.cache-hit != 'true'
      run: |
        echo "📥 下载内核源码 linux-6.18..."
        wget -q https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.18.tar.xz
        tar -xf linux-6.18.tar.xz
        echo "✅ 内核源码下载完成"

    - name: Configure kernel
      run: |
        cd linux-6.18
        
        # 下载配置文件
        echo "📝 配置内核..."
        wget -q -O .config.original https://raw.githubusercontent.com/puppylinux-woof-CE/woof-CE/testing/kernel-kit/configs_x86_64/DOTconfig-6.18.1-x86_64 || true
        
        if [ -f .config.original ]; then
          cp .config.original .config
        else
          make defconfig
        fi
        
        # 应用 VM 优化
        echo "🔧 应用虚拟机优化..."
        scripts/config --enable VIRTIO
        scripts/config --enable VIRTIO_PCI
        scripts/config --enable VIRTIO_BLK
        scripts/config --enable VIRTIO_NET
        scripts/config --enable VMXNET3
        scripts/config --enable E1000
        scripts/config --enable DRM_VMWGFX
        scripts/config --disable SOUND
        scripts/config --disable USB_SUPPORT
        scripts/config --disable WLAN
        
        # 启用电源管理相关选项
        scripts/config --enable POWER_SUPPLY
        scripts/config --enable SUSPEND
        scripts/config --enable HIBERNATION
        scripts/config --enable ACPI
        scripts/config --enable ACPI_BUTTON
        scripts/config --enable ACPI_POWER_METER
        scripts/config --enable ACPI_PROC_EVENT
        scripts/config --enable ACPI_SYSTEM_POWER_STATES_SUPPORT
        
        make olddefconfig

    - name: Build kernel
      run: |
        cd linux-6.18
        
        if [ -f "arch/x86/boot/bzImage" ] && [ "${{ steps.kernel-cache.outputs.cache-hit }}" == "true" ]; then
          echo "✅ 使用缓存的内核，跳过编译"
        else
          echo "🔨 编译内核中（这需要约30分钟）..."
          start_time=$(date +%s)
          
          make -j$(nproc) bzImage
          make -j$(nproc) modules
          
          end_time=$(date +%s)
          duration=$((end_time - start_time))
          echo "✅ 内核编译完成，耗时: $((duration / 60)) 分钟"
        fi
        
        echo "内核位置: $(pwd)/arch/x86/boot/bzImage"
        ls -lh arch/x86/boot/bzImage

    # ===== BusyBox 部分 =====
    - name: Download BusyBox
      if: steps.busybox-cache.outputs.cache-hit != 'true'
      run: |
        echo "📥 下载 BusyBox 1.36.1..."
        wget -q https://busybox.net/downloads/busybox-1.36.1.tar.bz2
        tar -xf busybox-1.36.1.tar.bz2
        echo "✅ BusyBox 下载完成"

    - name: Configure BusyBox
      run: |
        cd busybox-1.36.1
        
        echo "🔧 配置 BusyBox..."
        make defconfig
        
        # 静态编译
        sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config
        
        # 启用自定义脚本支持
        sed -i 's/# CONFIG_ASH is not set/CONFIG_ASH=y/' .config
        sed -i 's/# CONFIG_SH is not set/CONFIG_SH=y/' .config
        sed -i 's/# CONFIG_ASH_MATH_SUPPORT is not set/CONFIG_ASH_MATH_SUPPORT=y/' .config
        sed -i 's/# CONFIG_ASH_MATH_SUPPORT_64 is not set/CONFIG_ASH_MATH_SUPPORT_64=y/' .config
        
        # 启用电源管理命令
        sed -i 's/# CONFIG_REBOOT is not set/CONFIG_REBOOT=y/' .config
        sed -i 's/# CONFIG_HALT is not set/CONFIG_HALT=y/' .config
        sed -i 's/# CONFIG_POWEROFF is not set/CONFIG_POWEROFF=y/' .config
        
        # 禁用 TC
        sed -i 's/CONFIG_TC=y/# CONFIG_TC is not set/' .config 2>/dev/null || true
        
        # 启用实用功能
        sed -i 's/# CONFIG_FEATURE_PS_LONG is not set/CONFIG_FEATURE_PS_LONG=y/' .config
        sed -i 's/# CONFIG_FEATURE_TOP_CPU_USAGE_PERCENTAGE is not set/CONFIG_FEATURE_TOP_CPU_USAGE_PERCENTAGE=y/' .config
        sed -i 's/# CONFIG_FEATURE_SHUTDOWN_LOGIN is not set/CONFIG_FEATURE_SHUTDOWN_LOGIN=y/' .config
        sed -i 's/# CONFIG_FEATURE_MOUNT_LOOP is not set/CONFIG_FEATURE_MOUNT_LOOP=y/' .config
        sed -i 's/# CONFIG_FEATURE_MOUNT_FLAGS is not set/CONFIG_FEATURE_MOUNT_FLAGS=y/' .config
        
        make oldconfig

    - name: Build BusyBox
      run: |
        cd busybox-1.36.1
        
        if [ -f "busybox" ] && [ "${{ steps.busybox-cache.outputs.cache-hit }}" == "true" ]; then
          echo "✅ 使用缓存的 BusyBox，跳过编译"
        else
          echo "🔨 编译 BusyBox 中..."
          make -j$(nproc)
          make install
          echo "✅ BusyBox 编译完成"
        fi
        
        ls -lh busybox

    # ===== 创建 rootfs =====
    - name: Create rootfs
      run: |
        echo "📦 创建 rootfs..."
        
        # 创建目录结构
        mkdir -p rootfs/{bin,sbin,usr/bin,usr/sbin,etc,proc,sys,dev,lib,lib64,tmp,var,run,root,usr/local/bin}
        
        # 复制 BusyBox
        cp -a busybox-1.36.1/_install/* rootfs/
        
        # 创建设备节点
        sudo mknod -m 666 rootfs/dev/null c 1 3
        sudo mknod -m 644 rootfs/dev/console c 5 1
        sudo mknod -m 660 rootfs/dev/tty1 c 4 1
        sudo mknod -m 660 rootfs/dev/tty2 c 4 2
        sudo mknod -m 660 rootfs/dev/tty3 c 4 3
        sudo mknod -m 660 rootfs/dev/tty4 c 4 4
        
        # 创建 about 命令脚本
        cat > rootfs/usr/local/bin/about << 'EOF'
        #!/bin/sh
        # about command - display system information
        
        echo "GudaoUI linux V1"
        echo "myweb: gudaoweb.pages.dev"
        echo "linux: $(uname -r)"
        EOF
        
        chmod +x rootfs/usr/local/bin/about
        
        # 创建 calc 命令脚本
        cat > rootfs/usr/local/bin/calc << 'EOF'
        #!/bin/sh
        # calc command - simple calculator
        
        if [ $# -eq 0 ]; then
            echo "Usage: calc <expression>"
            echo "Example: calc 1+1"
            echo "Example: calc (2*2)+2"
            exit 1
        fi
        
        expression="$*"
        result=$(awk "BEGIN {print $expression}")
        
        if [ "$result" = "${result%.*}" ]; then
            echo "$result"
        else
            printf "%.2f\n" "$result"
        fi
        EOF
        
        chmod +x rootfs/usr/local/bin/calc
        
        # 创建 reboot/poweroff 的包装脚本
        cat > rootfs/usr/local/bin/reboot << 'EOF'
        #!/bin/sh
        # reboot command wrapper
        
        echo "System is rebooting..."
        sync
        /bin/busybox reboot -f
        EOF
        
        chmod +x rootfs/usr/local/bin/reboot
        
        cat > rootfs/usr/local/bin/poweroff << 'EOF'
        #!/bin/sh
        # poweroff command wrapper
        
        echo "System is powering off..."
        sync
        /bin/busybox poweroff -f
        EOF
        
        chmod +x rootfs/usr/local/bin/poweroff
        
        # 创建符号链接
        cd rootfs/usr/bin
        ln -sf ../local/bin/about about
        ln -sf ../local/bin/calc calc
        ln -sf ../local/bin/reboot reboot
        ln -sf ../local/bin/poweroff poweroff
        ln -sf poweroff halt
        cd ../../..
        
        # 创建 init 脚本（精简版，确保所有挂载正确）
        cat > rootfs/init << 'EOF'
        #!/bin/busybox sh
        # 初始化脚本 - 精简版
        
        # 挂载必要的文件系统
        /bin/busybox mount -t proc none /proc
        /bin/busybox mount -t sysfs none /sys
        /bin/busybox mount -t devtmpfs none /dev
        /bin/busybox mount -t tmpfs tmpfs /tmp
        
        # 创建必要的设备节点（如果devtmpfs没有自动创建）
        /bin/busybox mknod -m 660 /dev/tty1 c 4 1 2>/dev/null || true
        /bin/busybox mknod -m 660 /dev/tty2 c 4 2 2>/dev/null || true
        /bin/busybox mknod -m 660 /dev/tty3 c 4 3 2>/dev/null || true
        /bin/busybox mknod -m 660 /dev/tty4 c 4 4 2>/dev/null || true
        
        # 设置主机名
        /bin/busybox echo "gudao-ui" > /proc/sys/kernel/hostname
        
        # 配置loopback网络
        /bin/busybox ip link set lo up
        
        # 设置信号处理
        /bin/busybox trap "reboot" 2   # Ctrl-Alt-Del
        
        # 安装所有BusyBox应用程序
        /bin/busybox --install -s
        
        # 获取内存大小
        MEM_SIZE=$(/bin/busybox grep MemTotal /proc/meminfo | /bin/busybox awk '{print int($2/1024)}')
        
        # 清屏
        /bin/busybox clear
        
        # 显示启动画面
        /bin/busybox echo "====================="
        /bin/busybox echo "GudaoUI linux V1"
        /bin/busybox echo "====================="
        /bin/busybox echo "Enter 'about' to query system information"
        /bin/busybox echo "Enter 'calc' for calculator"
        /bin/busybox echo "Enter 'reboot' to restart"
        /bin/busybox echo "Enter 'poweroff' to shut down"
        /bin/busybox echo "Running memory size: ${MEM_SIZE}MB"
        /bin/busybox echo ""
        
        # 验证挂载点
        /bin/busybox echo "=== Mount points ==="
        /bin/busybox mount | /bin/busybox grep -E "proc|sys|dev|tmp" | /bin/busybox while read line; do
            /bin/busybox echo "  ✓ $line"
        done
        /bin/busybox echo ""
        
        # 进入交互式 Shell
        /bin/busybox echo "Welcome to GudaoUI Linux! Type 'exit' to logout."
        /bin/busybox echo ""
        
        # 启动shell
        exec /bin/sh
        EOF
        
        chmod +x rootfs/init
        
        # 创建基本配置文件
        echo "root:x:0:0:root:/root:/bin/sh" > rootfs/etc/passwd
        echo "root:x:0:" > rootfs/etc/group
        echo "nameserver 8.8.8.8" > rootfs/etc/resolv.conf
        
        # 创建 fstab 文件
        cat > rootfs/etc/fstab << 'EOF'
        proc            /proc           proc    defaults    0 0
        sysfs           /sys            sysfs   defaults    0 0
        devtmpfs        /dev            devtmpfs defaults  0 0
        tmpfs           /tmp            tmpfs   defaults    0 0
        EOF
        
        # 创建 profile 文件
        cat > rootfs/etc/profile << 'EOF'
        export PATH=/bin:/sbin:/usr/bin:/usr/sbin:/usr/local/bin
        export PS1='\u@\h:\w\$ '
        alias ll='ls -la'
        EOF
        
        # 打包 rootfs
        cd rootfs
        find . | cpio -o -H newc > ../rootfs.cpio
        cd ..
        
        echo "rootfs.cpio 大小: $(du -h rootfs.cpio | cut -f1)"

    # ===== 创建 ISO =====
    - name: Create bootable ISO
      run: |
        echo "💿 创建启动 ISO..."
        
        mkdir -p iso/boot/grub
        
        cp linux-6.18/arch/x86/boot/bzImage iso/boot/vmlinuz
        cp rootfs.cpio iso/boot/initramfs.cpio
        
        cat > iso/boot/grub/grub.cfg << EOF
        set default=0
        set timeout=3
        
        menuentry "GudaoUI Linux V1" {
          linux /boot/vmlinuz quiet console=tty0
          initrd /boot/initramfs.cpio
        }
        
        menuentry "GudaoUI Linux V1 (Debug)" {
          linux /boot/vmlinuz loglevel=7 console=tty0
          initrd /boot/initramfs.cpio
        }
        EOF
        
        # 使用动态生成的ISO名称
        grub-mkrescue -o "$ISO_NAME" iso/
        
        echo "✅ ISO 创建完成: $ISO_NAME"
        echo "ISO 大小: $(du -h $ISO_NAME | cut -f1)"

    # ===== 上传 ISO 到 Artifacts =====
    - name: Upload ISO to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.set-release-info.outputs.iso_name }}
        path: ${{ steps.set-release-info.outputs.iso_name }}
        retention-days: 30

    # ===== 创建 GitHub Release =====
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        name: ${{ steps.set-release-info.outputs.release_title }}
        tag_name: ${{ steps.set-release-info.outputs.release_tag }}
        body: |
          ## 🎉 GudaoUI Linux V1 发布
          
          ### 📦 构建信息
          - **构建时间**: $(date '+%Y-%m-%d %H:%M:%S')
          - **Unix时间戳**: ${{ steps.set-release-info.outputs.release_number }}
          - **Release数字**: ${{ steps.set-release-info.outputs.release_number }}
          
          ### 🔧 包含组件
          - Linux 内核 6.18 (虚拟机优化版)
          - BusyBox 1.36.1 (静态编译)
          - 最小 rootfs 文件系统
          - **about 命令** - 显示系统信息
          - **calc 命令** - 简单计算器
          - **修复 reboot/poweroff 命令**
          
          ### 💻 使用说明
          1. 下载 ISO 文件
          2. 在虚拟机软件中加载 ISO
          3. 启动后会自动显示系统信息
          4. 可用命令：
             - `about` - 显示系统信息
             - `calc` - 计算器 (如: calc 1+1)
             - `reboot` - 重启系统
             - `poweroff` - 关闭系统
          
          ### ⚡ 启动画面
          '''
          =====================
          GudaoUI linux V1
          =====================
          Enter 'about' to query system information
          Enter 'calc' for calculator
          Enter 'reboot' to restart
          Enter 'poweroff' to shut down
          Running memory size: XXXMB
          
          === Mount points ===
            ✓ proc on /proc type proc
            ✓ sysfs on /sys type sysfs
            ✓ devtmpfs on /dev type devtmpfs
            ✓ tmpfs on /tmp type tmpfs
          '''
          
          ### ⚡ 虚拟机优化
          已启用 VirtIO 驱动和ACPI电源管理，适用于主流虚拟化平台：
          - VMware
          - VirtualBox
          - KVM/QEMU
          - Hyper-V
          
          ### 📊 构建统计
          - 缓存命中: 内核: ${{ steps.kernel-cache.outputs.cache-hit }}, BusyBox: ${{ steps.busybox-cache.outputs.cache-hit }}
          - ISO大小: $(du -h ${{ steps.set-release-info.outputs.iso_name }} | cut -f1)
        files: |
          ${{ steps.set-release-info.outputs.iso_name }}
        draft: false
        prerelease: false
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ===== 显示构建信息 =====
    - name: Build summary
      if: always()
      run: |
        echo "## 📊 构建完成报告" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "### Release信息" >> $GITHUB_STEP_SUMMARY
        echo "- **Release标题**: ${{ steps.set-release-info.outputs.release_title }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Release标签**: ${{ steps.set-release-info.outputs.release_tag }}" >> $GITHUB_STEP_SUMMARY
        echo "- **ISO文件**: ${{ steps.set-release-info.outputs.iso_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Unix时间戳**: ${{ steps.set-release-info.outputs.release_number }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "### 启动画面" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "=====================" >> $GITHUB_STEP_SUMMARY
        echo "GudaoUI linux V1" >> $GITHUB_STEP_SUMMARY
        echo "=====================" >> $GITHUB_STEP_SUMMARY
        echo "Enter 'about' to query system information" >> $GITHUB_STEP_SUMMARY
        echo "Enter 'calc' for calculator" >> $GITHUB_STEP_SUMMARY
        echo "Enter 'reboot' to restart" >> $GITHUB_STEP_SUMMARY
        echo "Enter 'poweroff' to shut down" >> $GITHUB_STEP_SUMMARY
        echo "Running memory size: [动态获取]MB" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "=== Mount points ===" >> $GITHUB_STEP_SUMMARY
        echo "  ✓ proc on /proc type proc" >> $GITHUB_STEP_SUMMARY
        echo "  ✓ sysfs on /sys type sysfs" >> $GITHUB_STEP_SUMMARY
        echo "  ✓ devtmpfs on /dev type devtmpfs" >> $GITHUB_STEP_SUMMARY
        echo "  ✓ tmpfs on /tmp type tmpfs" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "### 修复功能" >> $GITHUB_STEP_SUMMARY
        echo "- **init脚本**: 已精简并确保所有文件系统正确挂载" >> $GITHUB_STEP_SUMMARY
        echo "- **reboot命令**: 现在可以正常重启系统" >> $GITHUB_STEP_SUMMARY
        echo "- **poweroff命令**: 现在可以正常关闭系统" >> $GITHUB_STEP_SUMMARY
        echo "- **挂载点验证**: 启动时会显示所有挂载点状态" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        echo "### 输出文件" >> $GITHUB_STEP_SUMMARY
        echo "- **内核文件**: $(du -h linux-6.18/arch/x86/boot/bzImage | cut -f1)" >> $GITHUB_STEP_SUMMARY
        echo "- **BusyBox**: $(du -h busybox-1.36.1/busybox | cut -f1)" >> $GITHUB_STEP_SUMMARY
        echo "- **rootfs.cpio**: $(du -h rootfs.cpio | cut -f1)" >> $GITHUB_STEP_SUMMARY
        echo "- **ISO文件**: $(du -h ${{ steps.set-release-info.outputs.iso_name }} | cut -f1)" >> $GITHUB_STEP_SUMMARY
