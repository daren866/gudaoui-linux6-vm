name: Build Linux Kernel 6.18 with BusyBox (SquashFS + Overlay)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      release_title: ${{ steps.set-release-info.outputs.release_title }}
      release_tag: ${{ steps.set-release-info.outputs.release_tag }}
      iso_path: ${{ steps.set-release-info.outputs.iso_path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set release info
        id: set-release-info
        run: |
          UNIX_TIMESTAMP=$(date +%s)
          RELEASE_NUMBER=$((UNIX_TIMESTAMP * 9178666))
          RELEASE_TITLE="Linux6-${RELEASE_NUMBER}"
          ISO_NAME="linux6-vm-${UNIX_TIMESTAMP}.iso"
          echo "release_title=$RELEASE_TITLE" >> $GITHUB_OUTPUT
          echo "release_tag=linux6-vm-${UNIX_TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "iso_name=$ISO_NAME" >> $GITHUB_OUTPUT
          echo "RELEASE_TITLE=$RELEASE_TITLE" >> $GITHUB_ENV
          echo "ISO_NAME=$ISO_NAME" >> $GITHUB_ENV

      - name: Generate cache keys
        id: cache-keys
        run: |
          cat > /tmp/kernel-config.txt << 'EOF'
          KERNEL_VERSION=6.18
          VIRTIO_ENABLED=1
          NETWORK_MODULES_ENABLED=1
          FAILOVER_MODULE=1
          EOF
          KERNEL_HASH=$(sha256sum /tmp/kernel-config.txt | cut -d' ' -f1)
          echo "kernel_hash=$KERNEL_HASH" >> $GITHUB_OUTPUT
          
          cat > /tmp/busybox-config.txt << 'EOF'
          BUSYBOX_VERSION=1.36.1
          STATIC_ENABLED=1
          UDHCPC_ENABLED=1
          ASH_ENABLED=1
          EOF
          BUSYBOX_HASH=$(sha256sum /tmp/busybox-config.txt | cut -d' ' -f1)
          echo "busybox_hash=$BUSYBOX_HASH" >> $GITHUB_OUTPUT

      - name: Cache kernel build
        uses: actions/cache@v4
        id: kernel-cache
        with:
          path: |
            linux-6.18
            !linux-6.18/.git
          key: kernel-6.18-${{ steps.cache-keys.outputs.kernel_hash }}
          restore-keys: |
            kernel-6.18-

      - name: Cache busybox build
        uses: actions/cache@v4
        id: busybox-cache
        with:
          path: |
            busybox-1.36.1
            !busybox-1.36.1/.git
          key: busybox-1.36.1-${{ steps.cache-keys.outputs.busybox_hash }}
          restore-keys: |
            busybox-1.36.1-

      - name: Check cache status
        run: |
          echo "## 🔍 缓存状态" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 内核缓存" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.kernel-cache.outputs.cache-hit }}" == "true" ]]; then
            echo "✅ **内核缓存命中！**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **内核缓存未命中**（首次运行正常）" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### BusyBox 缓存" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.busybox-cache.outputs.cache-hit }}" == "true" ]]; then
            echo "✅ **BusyBox 缓存命中！**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **BusyBox 缓存未命中**（首次运行正常）" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncurses-dev \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            bc \
            wget \
            cpio \
            xorriso \
            grub-pc-bin \
            grub-common \
            mtools \
            dosfstools \
            git \
            pkg-config \
            squashfs-tools \
            zlib1g-dev \
            autoconf \
            automake \
            libtool \
            binutils \
            libmbedtls-dev

      - name: Download kernel source
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          echo "📥 下载内核源码..."
          wget -q https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.18.tar.xz
          tar -xf linux-6.18.tar.xz

      - name: Configure kernel
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          cd linux-6.18
          echo "📝 配置内核..."
          # 确保生成初始 .config
          make defconfig
          
          # 使用 scripts/config 调整配置
          scripts/config --enable VIRTIO
          scripts/config --enable VIRTIO_PCI
          scripts/config --enable VIRTIO_BLK
          scripts/config --module VIRTIO_NET
          scripts/config --module VMXNET3
          scripts/config --module E1000
          scripts/config --module FAILOVER
          scripts/config --module NET_FAILOVER
          scripts/config --enable PACKET
          scripts/config --enable UNIX
          scripts/config --enable INET
          scripts/config --enable IP_PNP
          scripts/config --enable IP_PNP_DHCP
          scripts/config --enable NETDEVICES
          scripts/config --enable ACPI
          scripts/config --enable DEVTMPFS
          
          # 更新配置
          make olddefconfig
          
          # 强制模块配置（确保 failover 相关为模块）
          sed -i 's/^CONFIG_FAILOVER=.*/CONFIG_FAILOVER=m/' .config
          sed -i 's/^CONFIG_NET_FAILOVER=.*/CONFIG_NET_FAILOVER=m/' .config
          sed -i 's/^CONFIG_VIRTIO_NET=.*/CONFIG_VIRTIO_NET=m/' .config
          grep -q "^CONFIG_FAILOVER=" .config || echo "CONFIG_FAILOVER=m" >> .config
          grep -q "^CONFIG_NET_FAILOVER=" .config || echo "CONFIG_NET_FAILOVER=m" >> .config
          grep -q "^CONFIG_VIRTIO_NET=" .config || echo "CONFIG_VIRTIO_NET=m" >> .config
          
          # 再次更新配置
          make olddefconfig

      - name: Build kernel image
        run: |
          cd linux-6.18
          if [ -f "arch/x86/boot/bzImage" ] && [ "${{ steps.kernel-cache.outputs.cache-hit }}" == "true" ]; then
            echo "✅ 使用缓存的内核镜像"
          else
            echo "🔨 编译内核..."
            make -j$(nproc) bzImage
          fi
          ls -lh arch/x86/boot/bzImage

      - name: Build kernel modules
        run: |
          cd linux-6.18
          if [ -f "modules.tar.gz" ]; then
            echo "✅ 模块包已存在"
          else
            echo "🔨 编译内核模块..."
            make modules_prepare
            make -j$(nproc) modules
            mkdir -p ../modules-install
            make modules_install INSTALL_MOD_PATH=../modules-install
            cd ../modules-install
            tar -czf ../linux-6.18/modules.tar.gz lib
            cd ../linux-6.18
            rm -rf ../modules-install
          fi

      - name: Download BusyBox
        if: steps.busybox-cache.outputs.cache-hit != 'true'
        run: |
          echo "📥 下载 BusyBox..."
          wget -q https://busybox.net/downloads/busybox-1.36.1.tar.bz2
          tar -xf busybox-1.36.1.tar.bz2

      - name: Configure BusyBox
        if: steps.busybox-cache.outputs.cache-hit != 'true'
        run: |
          cd busybox-1.36.1
          echo "🔧 配置 BusyBox..."
          make defconfig
          
          sed -i 's/# CONFIG_STATIC is not set/CONFIG_STATIC=y/' .config
          sed -i 's/# CONFIG_ASH is not set/CONFIG_ASH=y/' .config
          sed -i 's/# CONFIG_ASH_MATH_SUPPORT is not set/CONFIG_ASH_MATH_SUPPORT=y/' .config
          sed -i 's/# CONFIG_ASH_MATH_SUPPORT_64 is not set/CONFIG_ASH_MATH_SUPPORT_64=y/' .config
          sed -i 's/# CONFIG_UDHCPC is not set/CONFIG_UDHCPC=y/' .config
          sed -i 's/# CONFIG_IFCONFIG is not set/CONFIG_IFCONFIG=y/' .config
          sed -i 's/# CONFIG_IP is not set/CONFIG_IP=y/' .config
          sed -i 's/# CONFIG_IPADDR is not set/CONFIG_IPADDR=y/' .config
          sed -i 's/# CONFIG_IPLINK is not set/CONFIG_IPLINK=y/' .config
          sed -i 's/# CONFIG_IPROUTE is not set/CONFIG_IPROUTE=y/' .config
          
          make olddefconfig

      - name: Build BusyBox
        run: |
          cd busybox-1.36.1
          if [ -f "busybox" ] && [ "${{ steps.busybox-cache.outputs.cache-hit }}" == "true" ]; then
            echo "✅ 使用缓存的 BusyBox"
          else
            echo "🔨 编译 BusyBox..."
            make -j$(nproc)
            make install
          fi

      - name: Build static curl (standalone)
        run: |
          echo "🌐 编译独立静态 curl..."
          wget -q https://curl.se/download/curl-8.4.0.tar.gz
          tar -xf curl-8.4.0.tar.gz
          cd curl-8.4.0
          ./configure \
            --disable-shared \
            --enable-static \
            --disable-ldap \
            --without-ssl \
            --without-zlib \
            --disable-ipv6 \
            --disable-manual \
            --prefix=/usr \
            CFLAGS="-Os -static" \
            LDFLAGS="-static"
          make -j$(nproc)
          mkdir -p ../curl-install/usr/bin
          cp src/curl ../curl-install/usr/bin/
          cd ..
          echo "✅ curl 编译完成"

      - name: Build MicroPython
        run: |
          echo "🐍 编译 MicroPython..."
          mkdir -p python-root/usr/local/bin
          git clone --depth 1 --branch v1.24.1 https://github.com/micropython/micropython.git
          cd micropython
          git submodule update --init --recursive
          make -C mpy-cross
          cd ports/unix
          
          make -j$(nproc) \
            CFLAGS_EXTRA="-static -I/usr/include/mbedtls" \
            LDFLAGS_EXTRA="-static" \
            MICROPY_PY_BTREE=0 \
            MICROPY_PY_SSL=1 \
            MICROPY_SSL_MBEDTLS=1 \
            MICROPY_PY_CRYPTOLIB=0 \
            MICROPY_PY_HASHLIB=1 \
            MICROPY_PY_TERMIOS=1 \
            MICROPY_PY_SOCKET=1 \
            MICROPY_PY_FFI=0 \
            MICROPY_PY_THREAD=0 \
            MICROPY_USE_READLINE=1
          
          if [ -f "micropython" ]; then
            cp micropython ../../../python-root/usr/local/bin/
          elif [ -f "build-standard/micropython" ]; then
            cp build-standard/micropython ../../../python-root/usr/local/bin/
          else
            echo "❌ 找不到 micropython 可执行文件"
            exit 1
          fi
          
          cd ../../..
          rm -rf micropython
          cd python-root/usr/local/bin
          ln -sf micropython python
          ln -sf micropython python3
          cd ../../../..
          echo "✅ MicroPython 完成"

      - name: Create rootfs
        run: |
          echo "📦 创建 rootfs..."
          mkdir -p rootfs/{bin,sbin,usr/bin,usr/local/bin,etc,proc,sys,dev,tmp,var,run,root,home,usr/share/udhcpc}
          
          cp -a busybox-1.36.1/_install/* rootfs/
          cp -a python-root/* rootfs/
          cp -a curl-install/usr/bin/curl rootfs/usr/bin/
          chmod 755 rootfs/usr/bin/curl
          
          # udhcpc 脚本
          cat > rootfs/usr/share/udhcpc/default.script << 'EOF'
          #!/bin/sh
          case "$2" in
          bound|renew)
              ip addr add "$ip/$mask" dev "$1" 2>/dev/null
              ip link set "$1" up
              [ -n "$router" ] && ip route add default via "$router" dev "$1" 2>/dev/null
              [ -n "$dns" ] && echo "nameserver $dns" > /etc/resolv.conf
              ;;
          deconfig)
              ip addr flush dev "$1" 2>/dev/null
              ip link set "$1" down
              ;;
          esac
          EOF
          chmod +x rootfs/usr/share/udhcpc/default.script
          
          # 解压内核模块
          [ -f linux-6.18/modules.tar.gz ] && tar -xzf linux-6.18/modules.tar.gz -C rootfs/
          
          # 设备节点
          sudo mknod -m 666 rootfs/dev/null c 1 3 2>/dev/null || true
          sudo mknod -m 644 rootfs/dev/console c 5 1 2>/dev/null || true
          
          # init 脚本
          cat > rootfs/init << 'EOF'
          #!/bin/sh
          export PATH=/bin:/sbin:/usr/bin:/usr/sbin:/usr/local/bin
          
          mount -t proc none /proc
          mount -t sysfs none /sys
          mount -t devtmpfs none /dev
          mount -t tmpfs tmpfs /tmp
          mkdir -p /dev/shm /dev/pts
          mount -t tmpfs tmpfs /dev/shm
          mount -t devpts none /dev/pts
          
          echo "gudao-ui" > /proc/sys/kernel/hostname 2>/dev/null
          /bin/busybox --install -s
          
          # 加载内核模块（若有）
          find /lib/modules -name "*.ko" -exec modprobe {} \; 2>/dev/null || true
          
          # 网络配置（后台运行）
          (
            sleep 2
            for iface in $(ip link show | grep -E "^[0-9]+: (eth|ens|enp)" | cut -d: -f2 | tr -d " "); do
                ip link set "$iface" up
                udhcpc -i "$iface" -s /usr/share/udhcpc/default.script -n -t 5 && break
            done
            if ! ip addr show | grep -q "inet "; then
                ip addr add 10.0.2.15/24 dev eth0 2>/dev/null
                ip link set eth0 up
                ip route add default via 10.0.2.2 2>/dev/null
                echo "nameserver 8.8.8.8" > /etc/resolv.conf
            fi
          ) &
          
          clear
          echo "========================================"
          echo "     GudaoUI Linux V1"
          echo "========================================"
          echo "Commands: python, curl, wget, reboot, poweroff"
          echo "System: Linux $(uname -r)"
          
          if command -v python >/dev/null 2>&1; then
              echo "$(python --version 2>&1)"
          fi
          if command -v curl >/dev/null 2>&1; then
              echo "$(curl --version 2>&1 | head -n1)"
          fi
          
          IP=$(ip addr show | grep "inet " | head -1 | awk '{print $2}' | cut -d/ -f1)
          [ -n "$IP" ] && echo "IP: $IP"
          echo "========================================"
          
          exec /bin/sh
          EOF
          chmod +x rootfs/init
          
          echo "root:x:0:0:root:/root:/bin/sh" > rootfs/etc/passwd
          echo "root:x:0:" > rootfs/etc/group
          echo "nameserver 8.8.8.8" > rootfs/etc/resolv.conf
          echo "127.0.0.1 localhost" > rootfs/etc/hosts
          
          echo "✅ rootfs 完成: $(du -sh rootfs | cut -f1)"

      - name: Create squashfs
        run: |
          mksquashfs rootfs rootfs.squashfs -comp xz -b 1M
          echo "✅ squashfs: $(du -h rootfs.squashfs | cut -f1)"

      - name: Build initramfs
        run: |
          mkdir -p initramfs/{bin,dev,proc,sys,mnt/iso,mnt/root,mnt/overlay,newroot}
          cp -a busybox-1.36.1/_install/* initramfs/
          sudo mknod -m 600 initramfs/dev/console c 5 1 2>/dev/null || true
          sudo mknod -m 666 initramfs/dev/null c 1 3 2>/dev/null || true
          
          cat > initramfs/init << 'EOF'
          #!/bin/sh
          mount -t proc none /proc
          mount -t sysfs none /sys
          mount -t devtmpfs none /dev
          
          mkdir -p /mnt/iso
          for dev in /dev/sr* /dev/sd*; do
              [ -e "$dev" ] && mount -t iso9660 "$dev" /mnt/iso 2>/dev/null && break
          done
          
          mount -t squashfs -o ro,loop /mnt/iso/boot/rootfs.squashfs /mnt/root || exec sh
          
          mkdir -p /mnt/overlay
          mount -t tmpfs tmpfs /mnt/overlay
          mkdir -p /mnt/overlay/upper /mnt/overlay/work
          mount -t overlay overlay -o lowerdir=/mnt/root,upperdir=/mnt/overlay/upper,workdir=/mnt/overlay/work /newroot || exec sh
          
          umount /proc /sys /dev 2>/dev/null
          exec switch_root /newroot /init
          EOF
          chmod +x initramfs/init
          
          cd initramfs
          find . | cpio -o -H newc | gzip > ../initramfs.cpio.gz
          cd ..

      - name: Create ISO
        run: |
          mkdir -p iso/boot/grub
          cp linux-6.18/arch/x86/boot/bzImage iso/boot/vmlinuz
          cp initramfs.cpio.gz iso/boot/
          cp rootfs.squashfs iso/boot/
          
          cat > iso/boot/grub/grub.cfg << 'EOF'
          set default=0
          set timeout=3
          menuentry "GudaoUI Linux" {
            linux /boot/vmlinuz quiet
            initrd /boot/initramfs.cpio.gz
          }
          EOF
          
          grub-mkrescue -o "$ISO_NAME" iso/
          echo "✅ ISO: $(du -h $ISO_NAME | cut -f1)"
          echo "iso_path=$ISO_NAME" >> $GITHUB_OUTPUT

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-release-info.outputs.iso_name }}
          path: ${{ steps.set-release-info.outputs.iso_name }}
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ steps.set-release-info.outputs.release_title }}
          tag_name: ${{ steps.set-release-info.outputs.release_tag }}
          body: |
            ## GudaoUI Linux
            
            ### 包含组件
            - Linux 6.18
            - BusyBox 1.36.1
            - curl 8.4.0 (独立静态编译)
            - MicroPython 1.24.1
            
            ### 构建时间
            $(date '+%Y-%m-%d %H:%M:%S')
          files: ${{ steps.set-release-info.outputs.iso_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
