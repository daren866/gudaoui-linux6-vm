          CONFIG_VLOCK=y
          CONFIG_MODPROBE_SMALL=y
          CONFIG_DEPMOD=y
          CONFIG_INSMOD=y
          CONFIG_LSMOD=y
          CONFIG_MODINFO=y
          CONFIG_MODPROBE=y
