          CONFIG_FEATURE_HUMAN_READABLE=y
          CONFIG_BASENAME=y
          CONFIG_CAT=y
          CONFIG_CHGRP=y
          CONFIG_CHMOD=y
          CONFIG_CHOWN=y
          CONFIG_CHROOT=y
          CONFIG_CP=y
          CONFIG_CUT=y
          CONFIG_DATE=y
          CONFIG_DD=y
          CONFIG_DF=y
          CONFIG_DIRNAME=y
          CONFIG_DOS2UNIX=y
          CONFIG_UNIX2DOS=y
          CONFIG_DU=y
